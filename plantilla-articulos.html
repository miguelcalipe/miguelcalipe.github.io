            <section> 
            <h2>2. EL EFECTO DE CARGA</h2>
            <p> 
            Se denomina <b>efecto de carga</b> al fenómeno por el cual un circuito que originalmente suministraba un determinado voltaje o corriente modifica su comportamiento al conectarse a otro circuito que extrae corriente de él. 
            </p>
            <p> En este contexto, la palabra <b>carga</b> no se refiere a carga eléctrica almacenada, sino al concepto de <i>load</i>, es decir, un elemento o circuito consumidor. </p>

            <p> En términos más generales, existe <b>efecto de carga</b> cuando un circuito conectado a la salida de otro absorbe corriente y modifica el voltaje o la corriente que el circuito original produciría sin esa conexión. Por eso también se habla de cargar una fuente, cargar un sensor, cargar un divisor. </p>
